<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Spunkmeyers Pub & Grill | Wadsworth, OH</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="description" content="Wadsworth's favorite pub. Cold beer, hot food, and the best patio in town. 18 beers on tap, smash burgers, and the Buck Naked Bar." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!--
      Hidden static forms for Netlify build-time form detection.
      The visible forms are rendered by React, so Netlify can only "see" them
      via these static copies. Field names must match the React form fields.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="careers" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="position" />
      <input type="text" name="availability" />
      <input type="text" name="hoursAvailable" />
      <input type="text" name="experience" />
      <textarea name="experienceDesc"></textarea>
      <textarea name="whySpunkmeyers"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
